server {
    listen 80;
    server_name robgid.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
server {
    listen 443 ssl;
    server_name robgid.space;

    ssl_certificate /etc/letsencrypt/live/robgid.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/robgid.space/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # location /nadsnax_api/ {
    #     proxy_pass http://nadsnax-backend-1:5000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location /api/ {
        proxy_pass http://flask_app:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # location /nadsnax/ {
    #     try_files $uri @nadsnax;
    # }

    # location @nadsnax {
    #     rewrite ^/nadsnax/(.*)$ /$1 break;
    #     proxy_pass http://nadsnax-frontend-1:80;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        try_files $uri /index.html;
    }
}
